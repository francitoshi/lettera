name: Build All Installers

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:   # Permite ejecutar manualmente desde la pestaña Actions

jobs:

  # ==================== LINUX ====================
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Linux artifacts
        run: ./gradlew clean buildDeb distTar --no-daemon --console=plain

      - name: Build Snap
        run: |
          sudo snap install snapcraft --classic
          snapcraft pack --destructive-mode

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            build/distributions/*.deb
            build/distributions/*.tar.gz
            *.snap
            install.sh

  # ==================== WINDOWS ====================
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Windows installer (jpackage)
        run: ./gradlew clean installDist createWindowsInstaller --no-daemon --console=plain

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/distributions/lettera-*.exe

  # ==================== macOS (Apple Silicon) ====================
  macos:
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21 (arm64)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build macOS .dmg (jpackage)
        run: ./gradlew clean installDist createMacDmg --no-daemon --console=plain

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: build/distributions/lettera-*.dmg