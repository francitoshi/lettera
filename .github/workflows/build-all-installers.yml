name: Build All Installers

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  # ==================== LINUX ====================
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build all Linux artifacts
        run: ./gradlew clean buildDeb distTar

      - name: Build Snap
        run: |
          sudo snap install snapcraft --classic
          snapcraft

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            build/distributions/*.deb
            build/distributions/*.tar.gz
            *.snap
            install.sh

  # ==================== WINDOWS ====================
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Build Windows installer (jpackage)
        run: ./gradlew clean installDist createWindowsInstaller

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/distributions/lettera-*.exe

  # ==================== macOS (Apple Silicon) ====================
  macos:
    runs-on: macos-26   # ← nativo arm64 (M1+ y MacBook Neo)
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21 (arm64)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Build macOS .dmg (jpackage)
        run: ./gradlew clean installDist createMacDmg

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: build/distributions/lettera-*.dmg

