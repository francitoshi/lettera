name: lettera
base: core24
version: '0.0.2'
summary: Aplicación Lettera
description: |
  Lettera is a Java 17 command-line application that requires internet access 
  and uses configuration files from the user's home directory.

grade: stable
confinement: strict

apps:
  lettera:
    command: bin/lettera
    plugs:
      - home
      - network
      - removable-media

parts:
  lettera:
    plugin: dump
    source: .
    source-type: local
    override-build: |
      craftctl default
      echo "→ Construyendo con Gradle (installDist)..."
      ./gradlew clean installDist --no-daemon --console=plain -x test
      echo "→ Copiando distribución al Snap..."
      cp -r build/install/lettera/* $CRAFT_PART_INSTALL/
    build-packages:
      - openjdk-21-jdk-headless
    stage-packages:
      - default-jre-headless
